<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Black circular background -->
  <circle cx="100" cy="100" r="100" fill="#1C1B1A"/>
  
  <!-- DM Logo -->
  <g transform="translate(100, 60)">
    <!-- D shape -->
    <path d="M -15 -20 L -5 -20 Q 10 -20 10 0 Q 10 20 -5 20 L -15 20 Z" fill="#D4A574" stroke="none"/>
    
    <!-- M shape with leaf accent -->
    <g transform="translate(20, -5)">
      <path d="M 0 25 L 0 -15 L 8 5 L 16 -15 L 16 25" fill="#D4A574" stroke="none" stroke-width="2"/>
      <!-- Leaf accent -->
      <path d="M -5 -18 Q -3 -25 2 -22 Q 0 -15 -5 -18" fill="#D4A574"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Dan-Moosa</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Hair Studio</text>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Men's & Women's</text>
</svg>